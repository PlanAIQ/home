<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F1A2E"/>
      <stop offset="100%" stop-color="#1E2E4A"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#991818"/>
      <stop offset="100%" stop-color="#B52020"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Grid lines -->
  <g opacity="0.05" stroke="#fff" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>
  <!-- Red accent bar -->
  <rect x="80" y="72" width="6" height="80" fill="url(#accent)" rx="3"/>
  <!-- Logo mark -->
  <rect x="80" y="180" width="56" height="56" rx="9" fill="#991818"/>
  <line x1="94" y1="190" x2="94" y2="226" stroke="#fff" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M94 190 Q107 190 107 199 Q107 208 94 208" stroke="#fff" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="118" y1="200" x2="118" y2="226" stroke="#fff" stroke-width="3.5" stroke-linecap="round"/>
  <circle cx="118" cy="193" r="2.8" fill="#fff"/>
  <!-- Wordmark -->
  <text x="150" y="216" font-family="Georgia, serif" font-size="42" font-weight="700" fill="#fff" letter-spacing="-1">Plan<tspan fill="#f59e0b" font-style="italic">AIQ</tspan></text>
  <!-- Tagline -->
  <text x="80" y="300" font-family="Arial, sans-serif" font-size="52" font-weight="700" fill="#fff" letter-spacing="-1">Business Intelligence</text>
  <text x="80" y="368" font-family="Arial, sans-serif" font-size="52" font-weight="700" fill="#fff" letter-spacing="-1">&amp; Analytics Consulting</text>
  <!-- Sub-tagline -->
  <text x="80" y="430" font-family="Arial, sans-serif" font-size="26" fill="#9ca3af">Michigan-based. Serving clients nationwide.</text>
  <!-- CTA pill -->
  <rect x="80" y="470" width="300" height="54" rx="27" fill="#991818"/>
  <text x="230" y="503" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#fff" text-anchor="middle">Free Data Audit →</text>
  <!-- URL -->
  <text x="1120" y="590" font-family="Arial, sans-serif" font-size="22" fill="#6b7280" text-anchor="end">planaiq.co</text>
</svg>